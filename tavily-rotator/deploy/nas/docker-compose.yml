services:
  nas-tavily-gateway:
    image: docker.io/${DOCKERHUB_USERNAME}/nas-tavily-gateway:${GATEWAY_IMAGE_TAG}
    container_name: nas-tavily-gateway
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT}:8000"
    restart: unless-stopped

  nas-tavily-mcp:
    image: docker.io/${DOCKERHUB_USERNAME}/nas-tavily-mcp:${MCP_IMAGE_TAG}
    container_name: nas-tavily-mcp
    env_file:
      - .env
    environment:
      PORT: 9000
      GATEWAY_BASE_URL: http://nas-tavily-gateway:8000
      GATEWAY_TOKEN: ${APP_API_TOKEN}
    depends_on:
      - nas-tavily-gateway
    ports:
      - "${MCP_PORT}:9000"
    restart: unless-stopped