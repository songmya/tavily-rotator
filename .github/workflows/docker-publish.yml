name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for gateway
        id: meta_gateway
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nas-tavily-gateway
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.meta_gateway.outputs.tags }}
          labels: ${{ steps.meta_gateway.outputs.labels }}

      - name: Extract metadata for mcp
        id: meta_mcp
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nas-tavily-mcp
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=tag

      - name: Build and push mcp
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: ${{ steps.meta_mcp.outputs.tags }}
          labels: ${{ steps.meta_mcp.outputs.labels }}